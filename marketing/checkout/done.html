<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Готово · Relo Dojo</title>
<!--
  Return page after the provider's checkout (BILLING_RETURN_URL points here). Payment is confirmed
  server-side by the webhook, NOT by landing here — so this page only reassures and sends the buyer
  back to the app, where premium unlocks on the next /auth/me refresh. Pass ?lang=en for English.
-->
<style>
  :root {
    --accent:#0E8A30; --gold:#E3A52C; --fire:#F0801F;
    --ink:#15201A; --ink2:#586A60; --ink3:#8A988F; --screen:#FBFDFB; --surface:#FFFFFF;
    --line:#E7EDE8; --radius:18px; --shadow:0 12px 32px rgba(21,32,26,.06);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
  }
  body { margin:0; font-family:var(--font); color:var(--ink); background:var(--screen); line-height:1.55; }
  .belt { height:6px; background:linear-gradient(90deg,var(--accent) 0 60%,var(--gold) 60% 80%,var(--fire) 80% 100%); }
  .wrap { max-width:440px; margin:0 auto; padding:64px 18px; text-align:center; }
  .badge { width:84px; height:84px; margin:0 auto 22px; border-radius:50%; background:#E0F0E4;
           display:flex; align-items:center; justify-content:center; font-size:42px; }
  h1 { font-size:26px; letter-spacing:-.02em; margin:0 0 8px; }
  p { color:var(--ink2); font-size:16px; margin:0 auto; max-width:30ch; }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
          box-shadow:var(--shadow); padding:28px 22px; }
  .hint { color:var(--ink3); font-size:13px; margin-top:18px; }
</style>
</head>
<body>
<div class="belt"></div>
<div class="wrap">
  <div class="card">
    <div class="badge">🥋</div>
    <h1 id="h1">Спасибо!</h1>
    <p id="body">Как только платёж подтвердится, Чёрный пояс откроется в приложении автоматически. Можно возвращаться в Relo Dojo.</p>
  </div>
  <p class="hint" id="hint">Доступ обновится при следующем открытии приложения.</p>
</div>
<script>
  if (new URLSearchParams(location.search).get("lang") === "en") {
    document.documentElement.lang = "en";
    document.getElementById("h1").textContent = "Thank you!";
    document.getElementById("body").textContent =
      "Once the payment confirms, Black Belt unlocks in the app automatically. You can head back to Relo Dojo.";
    document.getElementById("hint").textContent = "Your access refreshes next time you open the app.";
  }
</script>
</body>
</html>
